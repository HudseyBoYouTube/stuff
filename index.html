<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Makes the tab look like a real school project -->
    <link rel="icon" type="image/png" href="/assets/capybara.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Science Project - Period 4</title>

    <!-- Google Fonts: Baloo 2 for that clean gaming look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
      :root {
        --bg-color: #121212;
        --text-color: #ffffff;
        --accent-blue: #007bff; /* Using "blue" as preferred */
      }

      body {
        margin: 0;
        padding: 0;
        font-family: 'Baloo 2', cursive;
        background-color: var(--bg-color);
        color: var(--text-color);
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      #header-bar {
        height: 50px;
        background: #1e1e1e;
        border-bottom: 1px solid #333;
        display: flex;
        align-items: center;
        padding: 0 20px;
        font-weight: 600;
        color: #888;
        font-size: 0.9rem;
      }

      .main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 20px;
      }

      h1 {
        font-weight: 800;
        margin-bottom: 10px;
        color: var(--accent-blue);
      }

      footer {
        padding: 20px;
        font-size: 0.8rem;
        opacity: 0.5;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <!-- The "Stealth" header to look like a doc -->
    <div id="header-bar">
      Shared Drive > Science > Projects > Capybara_Data_v2.1
    </div>

    <div class="main-content">
      <h1>Capybara Science</h1>
      <p>Initializing Research Modules...</p>
      
      <!-- This is where your React/Vite app injects all the games -->
      <div id="root"></div>
    </div>

    <footer>
      &copy; 2026 Capybara Science Research Group
    </footer>

    <!-- Points to your main JS file to start the site -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
