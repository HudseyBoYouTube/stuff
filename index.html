<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Keeping the tab icon we set up earlier -->
    <link rel="icon" type="image/png" href="/assets/capybara.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- This keeps the browser tab looking like a school project for safety -->
    <title>Science Project - Period 4</title>

    <!-- Google Fonts: Baloo 2 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
      :root {
        --bg-color: #121212;
      }

      /* This section makes the site go full screen and removes all gaps */
      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: var(--bg-color);
        font-family: 'Baloo 2', cursive;
        overflow: hidden; /* Prevents double scrollbars from appearing */
      }

      /* Ensures the React app fills the entire browser window */
      #root {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>

    <!-- The root div is now the only thing visible, allowing the dashboard to take over -->
    <div id="root"></div>

    <!-- This script starts your Vite/React engine -->
    <script type="module" src="/src/main.jsx"></script>
    
  </body>
</html>
