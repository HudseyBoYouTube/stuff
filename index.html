    <title>Capybara Science</title>
  </head>
  <body>
    <div id="root"></div>

    <script>
      async function updateCounter() {
        try {
          // Connects to your live database
          const response = await fetch('https://carti-is-a-goat-rapper.fpp5vctrdx.workers.dev/api/players');
          if (!response.ok) throw new Error('Network response was not ok');
          
          const data = await response.json();
          
          // This part looks for the ID in your header
          const headerCounter = document.getElementById('player-count-header');
          if (headerCounter) {
            headerCounter.innerText = data.count.toLocaleString();
          }
        } catch (error) {
          console.error('Counter Error:', error);
        }
      }

      // Start the loop
      updateCounter();
      setInterval(updateCounter, 30000);
    </script>

    <script type="module" src="./src/main.jsx"></script>
  </body>
