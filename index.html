<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/jpeg" href="https://www.rainforest-alliance.org/wp-content/uploads/2021/06/capybara-square-1.jpg.optimal.jpg" />
    <title>Capybara Science</title>
  </head>
  <body>
    <div id="root"></div>

    <script>
      async function updateCounter() {
        try {
          const response = await fetch('https://puppy-math.canvasforschool.workers.dev/api/players');
          if (!response.ok) throw new Error('Network response was not ok');
          
          const data = await response.json();
          
          const headerCounter = document.getElementById('player-count-header');
          if (headerCounter) {
            headerCounter.innerText = data.count.toLocaleString();
          }
        } catch (error) {
          console.error('Counter Error:', error);
        }
      }

      updateCounter();
      setInterval(updateCounter, 30000);
    </script>

    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
